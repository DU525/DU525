name: Daily Activity

on:
  schedule:
    # 每天北京时间 9:00 (UTC 1:00) 运行
    - cron: '0 1 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  update-activity:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Update activity data
        run: |
          cat > activity.json << 'EOF'
          {
            "last_updated": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "date": "$(date +%Y-%m-%d)",
            "status": "active"
          }
          EOF
          # 用真实时间戳替换
          sed -i "s|\$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")|$(date -u +"%Y-%m-%dT%H:%M:%SZ")|" activity.json
          sed -i "s|\$(date +%Y-%m-%d)|$(date +%Y-%m-%d)|" activity.json
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add activity.json
          git diff --staged --quiet || git commit -m "chore: daily activity ping $(date -u +%Y-%m-%d)"
          git push
